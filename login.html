<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-page">

    <div class="left-side">

        <div class="logo">
            SmartGate AI
        </div>

        <h1>
            Welcome to
            <br>
            <span>SmartGate AI</span>
        </h1>

        <p>
            AI-powered gate automation and parking management
            for modern enterprises
        </p>

        <div class="features">

            <div class="feature">
                Advanced Security & Access Control
            </div>

            <div class="feature">
                Real-Time AI License Plate Recognition
            </div>

            <div class="feature">
                Enterprise-Grade Data Protection
            </div>

        </div>

    </div>

    <div class="login-card">

        <h2>Log In</h2>

        <p>
            Access your SmartGate AI Dashboard
        </p>

        <input type="email" placeholder="Email Address">

        <input type="password" placeholder="Password">

        <button class="green-btn full-btn" onclick="goToDashboard()">
            Log In To Dashboard
        </button>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
